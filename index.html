<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Çınar Cafe Restoran — Menü</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0F0C; --surface:#0F1612; --card:#13201A; --cardH:#1A2A22;
    --border:#26352C; --gold:#CBA858; --goldL:#E8CE84; --goldD:#A8843C;
    --cream:#F4ECDA; --creamDim:#BEB39C; --text:#F0E9D8; --muted:#7E8478;
    --spicy:#D9694C; --veg:#5BB389; --pop:#CBA858;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  ::-webkit-scrollbar{width:0;height:0;}
  img{display:block;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
  @keyframes glow{0%,100%{opacity:.06;}50%{opacity:.12;}}
  @keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .fadeUp{animation:fadeUp .7s cubic-bezier(.2,.7,.2,1) both;}

  .gold-text{background:linear-gradient(100deg,var(--goldD),var(--goldL) 25%,var(--gold) 50%,var(--goldL) 75%,var(--goldD));background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 7s linear infinite;}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:70;display:flex;justify-content:flex-end;padding:14px 18px;pointer-events:none;}
  .lang{pointer-events:auto;display:flex;gap:2px;background:rgba(15,22,18,.92);border:1px solid var(--border);border-radius:30px;padding:3px;}
  .lang button{background:none;border:none;color:var(--muted);font-family:'Jost';font-size:11px;font-weight:500;letter-spacing:1px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .3s;}
  .lang button.on{background:var(--gold);color:#0A0F0C;}

  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;overflow:hidden;background:radial-gradient(ellipse 80% 55% at 50% 42%, var(--card) 0%, var(--bg) 75%);}
  .ring{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);border:1px solid var(--gold);border-radius:50%;pointer-events:none;opacity:.08;}
  .ring1{width:min(620px,92vw);height:min(620px,92vw);}
  .ring2{width:min(460px,68vw);height:min(460px,68vw);opacity:.09;}
  .crest{font-size:60px;margin-bottom:18px;}
  .est{color:var(--gold);font-size:11px;letter-spacing:5px;text-transform:uppercase;margin-bottom:14px;}
  .brand{font-family:'Cormorant Garamond';font-size:clamp(64px,20vw,120px);font-weight:600;letter-spacing:8px;line-height:.85;}
  .subwrap{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px;}
  .subline{width:48px;height:1px;background:var(--gold);opacity:.5;}
  .subtitle{font-family:'Cormorant Garamond';font-style:italic;color:var(--creamDim);font-size:clamp(18px,5vw,28px);letter-spacing:3px;}
  .tagline{color:var(--muted);font-size:14px;max-width:360px;line-height:1.8;margin-top:20px;font-weight:300;}
  .scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.7;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .scroll-hint .arrow{font-size:16px;animation:fadeUp 1.4s ease-in-out infinite alternate;}

  .featured{padding:44px 0 8px;}
  .sec-title{text-align:center;margin-bottom:22px;padding:0 24px;}
  .sec-title .lbl{color:var(--gold);font-size:11px;letter-spacing:4px;text-transform:uppercase;}
  .sec-title .nm{font-family:'Cormorant Garamond';font-size:30px;font-weight:600;color:var(--cream);margin-top:4px;}
  .sec-title .deco{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
  .sec-title .deco .l{width:34px;height:1px;background:var(--gold);opacity:.5;}
  .sec-title .deco .d{color:var(--gold);font-size:10px;}
  .fscroll{display:flex;gap:14px;overflow-x:auto;padding:4px 18px 18px;scroll-snap-type:x mandatory;}
  .fcard{flex:0 0 auto;width:230px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.2,.7,.2,1);position:relative;}
  .fcard:active{transform:scale(.98);}
  .fcard .ph-img{width:100%;height:150px;object-fit:cover;background:linear-gradient(135deg,var(--cardH),var(--surface));}
  .fcard .ph-emoji{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:54px;opacity:.6;background:radial-gradient(circle at 50% 40%, rgba(203,168,88,.14), transparent 70%), linear-gradient(135deg,var(--cardH),var(--surface));}
  .fcard .fbody{padding:14px 16px 16px;}
  .fcard .fnm{font-family:'Cormorant Garamond';font-size:20px;font-weight:600;color:var(--cream);line-height:1.15;}
  .fcard .fds{color:var(--muted);font-size:11.5px;line-height:1.5;margin-top:4px;font-weight:300;height:34px;overflow:hidden;}
  .fcard .fpr{font-family:'Cormorant Garamond';font-size:19px;font-weight:600;color:var(--gold);margin-top:8px;}
  .fcard .ribbon{position:absolute;top:12px;left:0;background:var(--gold);color:#0A0F0C;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 12px 4px 10px;border-radius:0 20px 20px 0;}

  .catnav{position:sticky;top:0;z-index:50;background:rgba(15,22,18,.97);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .catnav-inner{display:flex;gap:0;padding:0 8px;max-width:640px;margin:0 auto;}
  .catbtn{flex-shrink:0;padding:14px 14px 12px;background:none;border:none;cursor:pointer;font-family:'Jost';font-size:12px;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .3s;}
  .catbtn.active{color:var(--gold);border-bottom-color:var(--gold);}

  .menu-wrap{max-width:640px;margin:0 auto;padding:0 18px 80px;}
  .cat-section{padding-top:40px;scroll-margin-top:60px;}
  .cat-head{text-align:center;margin-bottom:20px;}
  .cat-head .icon{font-size:30px;}
  .cat-head .name{font-family:'Cormorant Garamond';font-size:32px;font-weight:600;color:var(--cream);letter-spacing:1px;margin-top:4px;}
  .cat-head .deco{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
  .cat-head .deco .l{width:34px;height:1px;background:var(--gold);opacity:.5;}
  .cat-head .deco .d{color:var(--gold);font-size:10px;}

  .item{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .25s;border-radius:10px;}
  .item:active{background:var(--cardH);}
  .item:last-child{border-bottom:none;}
  .item .thumb{width:84px;height:84px;border-radius:12px;flex-shrink:0;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--cardH),var(--surface));border:1px solid var(--border);}
  .item .thumb img{width:100%;height:100%;object-fit:cover;}
  .item .thumb::after{content:"";position:absolute;inset:4px;border:1px solid var(--gold);opacity:.25;border-radius:8px;pointer-events:none;}
  .item .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;opacity:.6;background:radial-gradient(circle at 50% 40%, rgba(203,168,88,.12), transparent 70%);}
  .item .info{flex:1;min-width:0;}
  .item .nm{font-family:'Cormorant Garamond';font-size:21px;font-weight:600;color:var(--cream);line-height:1.2;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .item .ds{color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:4px;font-weight:300;}
  .item .pr{font-family:'Cormorant Garamond';font-size:21px;font-weight:600;color:var(--gold);white-space:nowrap;padding-top:2px;}
  .badge{font-size:13px;line-height:1;}
  .badges-inline{display:inline-flex;gap:4px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(5,8,6,.9);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:modalIn .4s cubic-bezier(.2,.7,.2,1);position:relative;}
  @media(min-width:560px){.modal-overlay{align-items:center;}.modal{border-radius:24px;border:1px solid var(--border);}}
  .modal .grab{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
  .modal .close{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(10,15,12,.6);border:1px solid var(--border);color:var(--cream);font-size:18px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;}
  .modal .m-img{width:100%;height:260px;object-fit:cover;background:linear-gradient(135deg,var(--cardH),var(--surface));}
  .modal .m-emoji{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.5;background:linear-gradient(135deg,var(--cardH),var(--surface));}
  .modal .m-body{padding:22px 24px 36px;}
  .modal .m-badges{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .m-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;letter-spacing:.5px;padding:4px 11px;border-radius:20px;border:1px solid;}
  .m-tag.spicy{color:var(--spicy);border-color:#D9694C50;background:#D9694C15;}
  .m-tag.veg{color:var(--veg);border-color:#5BB38950;background:#5BB38915;}
  .m-tag.pop{color:var(--pop);border-color:#CBA85850;background:#CBA85815;}
  .m-tag.chef{color:var(--goldL);border-color:#E8CE8450;background:#E8CE8415;}
  .modal .m-nm{font-family:'Cormorant Garamond';font-size:32px;font-weight:600;color:var(--cream);line-height:1.1;}
  .modal .m-ds{color:var(--creamDim);font-size:14px;line-height:1.7;margin-top:12px;font-weight:300;}
  .modal .m-pr{font-family:'Cormorant Garamond';font-size:30px;font-weight:600;color:var(--gold);margin-top:18px;}
  .modal .m-deco{display:flex;align-items:center;gap:10px;margin:18px 0 6px;}
  .modal .m-deco .l{flex:1;height:1px;background:var(--border);}
  .modal .m-deco .d{color:var(--gold);font-size:10px;}
  .modal .m-note{color:var(--muted);font-size:11px;letter-spacing:1px;text-align:center;text-transform:uppercase;}

  .footer{text-align:center;padding:40px 24px 50px;border-top:1px solid var(--border);background:var(--surface);}
  .footer .logo{font-family:'Cormorant Garamond';color:var(--gold);font-size:28px;font-weight:600;letter-spacing:3px;}
  .footer .info{color:var(--muted);font-size:12px;line-height:2;margin-top:12px;font-weight:300;}
  .footer .deco{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0;}
  .footer .deco .l{width:40px;height:1px;background:var(--gold);opacity:.4;}
  .footer .deco .d{color:var(--gold);font-size:10px;}

  .totop{position:fixed;bottom:20px;right:20px;width:46px;height:46px;border-radius:50%;background:var(--gold);color:#0A0F0C;border:none;font-size:18px;cursor:pointer;box-shadow:0 6px 24px rgba(203,168,88,.4);opacity:0;pointer-events:none;transition:opacity .3s;z-index:60;display:flex;align-items:center;justify-content:center;}
  .totop.show{opacity:1;pointer-events:auto;}
</style>
</head>
<body>

<div class="topbar">
  <div class="lang">
    <button id="lang-tr" class="on" onclick="setLang('tr')">TR</button>
    <button id="lang-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<header class="hero">
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>
  <div class="crest fadeUp">🌳</div>
  <div class="est fadeUp" style="animation-delay:.1s" data-i18n="est">Est. 1998 — Hoş Geldiniz</div>
  <h1 class="brand gold-text fadeUp" style="animation-delay:.2s">ÇINAR</h1>
  <div class="subwrap fadeUp" style="animation-delay:.3s">
    <div class="subline"></div><div class="subtitle">Cafe Restoran</div><div class="subline"></div>
  </div>
  <p class="tagline fadeUp" style="animation-delay:.4s" data-i18n="tagline">Damağınıza hitap eden lezzetlerimizi keşfedin. Afiyet olsun.</p>
  <div class="scroll-hint fadeUp" style="animation-delay:.7s"><span data-i18n="menuWord">Menü</span><span class="arrow">⌄</span></div>
</header>

<section class="featured">
  <div class="sec-title">
    <div class="lbl" data-i18n="featuredLbl">Şefin Önerisi</div>
    <div class="nm" data-i18n="featuredNm">Öne Çıkanlar</div>
    <div class="deco"><div class="l"></div><div class="d">◆</div><div class="l"></div></div>
  </div>
  <div class="fscroll" id="fscroll"></div>
</section>

<nav class="catnav" id="catnav"><div class="catnav-inner" id="catnavInner"></div></nav>
<main class="menu-wrap" id="menuWrap"></main>

<footer class="footer">
  <div class="logo">ÇINAR</div>
  <div class="deco"><div class="l"></div><div class="d">◆</div><div class="l"></div></div>
  <div class="info" data-i18n="footer">Çınar Cafe Restoran<br>Her gün 08:00 — 24:00<br>Afiyet olsun · Teşekkür ederiz</div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>
<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    { ad:"İkliye Baklava", ad_en:"İkliye Baklava", ikon:"🍮", aciklama:"Antep fıstıklı özel baklava", aciklama_en:"Special pistachio baklava", fiyat:"250 ₺", gorsel:"", rozet:["chef","pop"], oneCikan:true },
    { ad:"Soğuk Baklava", ad_en:"Cold Baklava", ikon:"🍮", aciklama:"Sütlü soğuk baklava", aciklama_en:"Milky cold baklava", fiyat:"250 ₺", gorsel:"", rozet:["pop"] },
    { ad:"Kabak Tatlısı", ad_en:"Pumpkin Dessert", ikon:"🎃", aciklama:"Tahinli cevizli kabak tatlısı", aciklama_en:"Pumpkin dessert with tahini and walnut", fiyat:"250 ₺", gorsel:"", rozet:["veg"] },
    { ad:"Köstebek Tatlısı", ad_en:"Mole Cake", ikon:"🍫", aciklama:"Muzlu çikolatalı köstebek", aciklama_en:"Banana chocolate mole cake", fiyat:"120 ₺", gorsel:"", rozet:[] },
    { ad:"Kemer Tatlısı", ad_en:"Kemer Dessert", ikon:"🍮", aciklama:"Şerbetli geleneksel tatlı", aciklama_en:"Traditional syrup dessert", fiyat:"120 ₺", gorsel:"", rozet:[] },
    { ad:"Sütlaç", ad_en:"Rice Pudding", ikon:"🍮", aciklama:"Fırında geleneksel sütlaç", aciklama_en:"Traditional baked rice pudding", fiyat:"120 ₺", gorsel:"", rozet:["veg"] },
  ]},
  { id:"dondurma", icon:"🍨", name:"Dondurma", name_en:"Ice Cream", items:[
    { ad:"Külah Dondurma", ad_en:"Cone Ice Cream", ikon:"🍦", aciklama:"Tek top külah dondurma", aciklama_en:"Single scoop cone", fiyat:"50 ₺", gorsel:"", rozet:[] },
    { ad:"Kase Dondurma", ad_en:"Bowl Ice Cream", ikon:"🍨", aciklama:"Kasede karışık dondurma", aciklama_en:"Mixed ice cream bowl", fiyat:"100 ₺", gorsel:"", rozet:["pop"] },
    { ad:"Meyveli Dondurma", ad_en:"Fruit Ice Cream", ikon:"🍨", aciklama:"Meyveli özel dondurma tabağı", aciklama_en:"Special fruit ice cream plate", fiyat:"100 ₺", gorsel:"", rozet:["veg"] },
  ]},
];

let LANG = "tr";
const BADGE_EMOJI = { spicy:"🌶️", veg:"🌿", pop:"⭐", chef:"👨‍🍳" };
function t(k){ return I18N[LANG][k] || k; }
function itemName(it){ return LANG==="en" && it.ad_en ? it.ad_en : it.ad; }
function itemDesc(it){ return LANG==="en" && it.aciklama_en ? it.aciklama_en : it.aciklama; }
function catName(c){ return LANG==="en" && c.name_en ? c.name_en : c.name; }

const navInner = document.getElementById('catnavInner');
const menuWrap = document.getElementById('menuWrap');
const fscroll = document.getElementById('fscroll');

function badgesInline(rozet){
  if(!rozet || !rozet.length) return "";
  return '<span class="badges-inline">' + rozet.map(function(r){ return '<span class="badge" title="'+t(r)+'">'+BADGE_EMOJI[r]+'</span>'; }).join("") + '</span>';
}

function render(){
  fscroll.innerHTML = "";
  var featured = [];
  MENU.forEach(function(c){ c.items.forEach(function(it){ if(it.oneCikan) featured.push({it:it,cat:c}); }); });
  featured.forEach(function(o){
    var it=o.it, cat=o.cat;
    var card = document.createElement('div');
    card.className = 'fcard';
    var topBadge = it.rozet && it.rozet.length ? '<div class="ribbon">'+t(it.rozet[0])+'</div>' : "";
    var img = it.gorsel ? '<img class="ph-img" src="'+it.gorsel+'" alt="'+itemName(it)+'" loading="lazy" onerror="this.outerHTML=\'<div class=ph-emoji>'+cat.icon+'</div>\'">' : '<div class="ph-emoji">'+(it.ikon||cat.icon)+'</div>';
    card.innerHTML = topBadge+img+'<div class="fbody"><div class="fnm">'+itemName(it)+'</div><div class="fds">'+itemDesc(it)+'</div><div class="fpr">'+it.fiyat+'</div></div>';
    card.onclick = function(){ openModal(it, cat); };
    fscroll.appendChild(card);
  });

  navInner.innerHTML = "";
  menuWrap.innerHTML = "";
  MENU.forEach(function(cat, idx){
    var btn = document.createElement('button');
    btn.className = 'catbtn' + (idx===0 ? ' active' : '');
    btn.textContent = cat.icon + ' ' + catName(cat);
    btn.dataset.target = cat.id;
    btn.onclick = function(){ document.getElementById(cat.id).scrollIntoView({ behavior:'smooth', block:'start' }); };
    navInner.appendChild(btn);

    var sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.id = cat.id;
    sec.innerHTML = '<div class="cat-head"><div class="icon">'+cat.icon+'</div><div class="name">'+catName(cat)+'</div><div class="deco"><div class="l"></div><div class="d">◆</div><div class="l"></div></div></div>';

    cat.items.forEach(function(it){
      var row = document.createElement('div');
      row.className = 'item';
      var thumbInner = it.gorsel
        ? '<img src="'+it.gorsel+'" alt="'+itemName(it)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';"><div class="ph" style="display:none">'+cat.icon+'</div>'
        : '<div class="ph">'+(it.ikon||cat.icon)+'</div>';
      row.innerHTML = '<div class="thumb">'+thumbInner+'</div><div class="info"><div class="nm">'+itemName(it)+' '+badgesInline(it.rozet)+'</div>'+(itemDesc(it)?'<div class="ds">'+itemDesc(it)+'</div>':'')+'</div><div class="pr">'+it.fiyat+'</div>';
      row.onclick = function(){ openModal(it, cat); };
      sec.appendChild(row);
    });
    menuWrap.appendChild(sec);
  });
  bindScrollSpy();
}

var overlay = document.getElementById('modalOverlay');
var modalBox = document.getElementById('modalBox');
function openModal(it, cat){
  var tags = (it.rozet||[]).map(function(r){ return '<span class="m-tag '+r+'">'+BADGE_EMOJI[r]+' '+t(r)+'</span>'; }).join("");
  var img = it.gorsel ? '<img class="m-img" src="'+it.gorsel+'" alt="'+itemName(it)+'" onerror="this.outerHTML=\'<div class=m-emoji>'+cat.icon+'</div>\'">' : '<div class="m-emoji">'+(it.ikon||cat.icon)+'</div>';
  modalBox.innerHTML = '<div class="grab"></div><button class="close" onclick="closeModal()">✕</button>'+img+'<div class="m-body">'+(tags?'<div class="m-badges">'+tags+'</div>':'')+'<div class="m-nm">'+itemName(it)+'</div>'+(itemDesc(it)?'<div class="m-ds">'+itemDesc(it)+'</div>':'')+'<div class="m-pr">'+it.fiyat+'</div><div class="m-deco"><div class="l"></div><div class="d">◆</div><div class="l"></div></div><div class="m-note">Çınar Cafe Restoran</div></div>';
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal(){ overlay.classList.remove('show'); document.body.style.overflow = ''; }

function setLang(l){
  LANG = l;
  document.getElementById('lang-tr').classList.toggle('on', l==='tr');
  document.getElementById('lang-en').classList.toggle('on', l==='en');
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(function(el){ el.innerHTML = t(el.dataset.i18n); });
  render();
}

var sections=[], navButtons=[];
var totop = document.getElementById('totop');
var lastActive = null;
var ticking = false;
function bindScrollSpy(){
  sections = MENU.map(function(c){ return document.getElementById(c.id); });
  navButtons = Array.prototype.slice.call(document.querySelectorAll('.catbtn'));
  lastActive = null;
}
function updateSpy(){
  ticking = false;
  var y = window.scrollY + 130;
  var active = sections[0] ? sections[0].id : null;
  for(var i=0;i<sections.length;i++){ var s=sections[i]; if(s && s.offsetTop <= y) active = s.id; }
  totop.classList.toggle('show', window.scrollY > 600);
  if(active === lastActive) return;   // nothing changed -> do nothing (prevents jitter)
  lastActive = active;
  var activeBtn = null;
  navButtons.forEach(function(b){
    var on = b.dataset.target === active;
    b.classList.toggle('active', on);
    if(on) activeBtn = b;
  });
  // scroll the nav strip horizontally only (never the page), and only when active changes
  if(activeBtn){
    var nav = document.getElementById('catnav');
    var target = activeBtn.offsetLeft - (nav.clientWidth/2) + (activeBtn.clientWidth/2);
    nav.scrollTo({ left: target, behavior:'smooth' });
  }
}
function onScroll(){
  if(!ticking){ ticking = true; requestAnimationFrame(updateSpy); }
}
window.addEventListener('scroll', onScroll, { passive:true });

render();
updateSpy();
</script>
</body>
</html>
